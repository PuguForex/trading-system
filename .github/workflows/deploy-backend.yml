name: Deploy Backend (Render)

on:
  push:
    branches: [ "main" ]
    paths:
      - "apps/api-service/**"
      - "packages/config/**"
      - "packages/shared-types/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:    

permissions:          # ← ADD THIS BLOCK
  contents: read      # ← curl webhook only — no repo write needed

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy
        run: |
          curl --fail --silent --show-error -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"